<div id="editModal" class="modal">
    <div class="modal-box">
        <h3 id="editHeader">Edit</h3>
        <input id="modalInput" placeholder="Enter details...">
        
        <select id="modalTrainer" style="display:none;">
            <option>Au</option>
            <option>Chanie</option>
            <option>Leo</option>
        </select>
        <button onclick="confirmModal()">Save</button>
        <button class="closeBtn" onclick="closeEdit()">Cancel</button>
    </div>
</div>

<script>
// ... (Previous trainers, currentTrainer, and UI functions remain exactly the same)

/* UPDATED ACTIONS */
function openEditName(){ 
    mode = "name"; 
    document.getElementById("editHeader").innerText = "Edit Name";
    document.getElementById("modalInput").style.display = "block"; // Show box
    document.getElementById("modalInput").value = trainers[currentTrainer][selectedIndex].name;
    document.getElementById("modalTrainer").style.display = "none"; // Hide select
    document.getElementById("editModal").classList.add("active"); 
    closeAction(); 
}

function openEditAgency(){ 
    mode = "agency"; 
    document.getElementById("editHeader").innerText = "Edit Agency";
    document.getElementById("modalInput").style.display = "block"; // Show box
    document.getElementById("modalInput").value = trainers[currentTrainer][selectedIndex].agency;
    document.getElementById("modalTrainer").style.display = "none"; // Hide select
    document.getElementById("editModal").classList.add("active"); 
    closeAction(); 
}

function openMove(){ 
    mode = "move"; 
    document.getElementById("editHeader").innerText = "Move to Trainer";
    document.getElementById("modalInput").style.display = "none"; // Hide box
    document.getElementById("modalTrainer").style.display = "block"; // Show select
    document.getElementById("editModal").classList.add("active"); 
    closeAction(); 
}

function confirmModal(){
    let va = trainers[currentTrainer][selectedIndex];
    let val = document.getElementById("modalInput").value;

    if(mode === "name") va.name = val;
    if(mode === "agency") va.agency = val;
    if(mode === "move"){
        let t = document.getElementById("modalTrainer").value;
        trainers[t].push(va);
        trainers[currentTrainer].splice(selectedIndex, 1);
    }

    save();
    render();
    closeEdit();
    toast("Updated");
}

function closeEdit(){ 
    document.getElementById("editModal").classList.remove("active"); 
}

// ... (Rest of your original script remains the same)
updateTrainerUI();
render();
</script>
