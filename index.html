<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f5f9;
}

/* TOPBAR */
.topbar {
    background: linear-gradient(90deg, #e63946, #d62839);
    color: white;
    padding: 15px;
    font-weight: bold;
    letter-spacing: 0.5px;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR (DARK MODERN) */
.sidebar {
    width: 25%;
    background: #1f2937;
    color: #e5e7eb;
    padding: 20px;
}

.sidebar h3, .sidebar h4 {
    color: #ffffff;
}

.sidebar button {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    background: #374151;
    border: 1px solid #4b5563;
    color: #e5e7eb;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.2s;
}

.sidebar button:hover {
    background: #e63946;
    border-color: #e63946;
}

/* MAIN AREA */
.main {
    width: 75%;
    padding: 20px;
    overflow-y: auto;
}

/* CARDS */
.card {
    background: #ffffff;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    border: 1px solid #e2e8f0;
}

/* INPUTS */
input, select {
    padding: 10px;
    margin: 8px 0;
    width: 280px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    outline: none;
}

input:focus, select:focus {
    border-color: #e63946;
    box-shadow: 0 0 0 3px rgba(230,57,70,0.15);
}

/* BUTTONS */
button {
    background: #e63946;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.2s;
}

button:hover {
    background: #d62839;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

/* SEATS */
.seat {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    min-height: 70px;
    transition: 0.2s;
}

.seat:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.seat.highlight {
    border: 2px solid #e63946;
    background: rgba(230,57,70,0.08);
    transform: scale(1.05);
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #1f2937;
    color: #ffffff;
    padding: 14px;
    border-left: 5px solid #e63946;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    opacity: 0;
    transform: translateX(100px);
    transition: 0.3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateX(0);
}

/* MODALS */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;

    opacity: 0;
    pointer-events: none;
    transition: 0.25s ease;
}

.modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
}

.hidden { display: none; }

.modal-box, .action-box {
    background: #ffffff;
    width: 340px;
    border-radius: 14px;
    text-align: center;
    padding: 20px;
    transform: translateY(20px) scale(0.95);
    opacity: 0;
    transition: 0.25s ease;
    border: 1px solid #e2e8f0;
}

.modal-overlay.show .modal-box,
.modal-overlay.show .action-box {
    transform: translateY(0) scale(1);
    opacity: 1;
}

.modal-actions {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

.modal-actions button {
    width: 45%;
}

#modalCancel {
    background: #64748b;
}

#modalOk {
    background: #e63946;
}

/* ACTION */
.action-box button {
    width: 100%;
    margin: 6px 0;
    border-radius: 8px;
}

.secondary { background: #2563eb !important; }
.danger { background: #e63946 !important; }
.closeBtn { background: #64748b !important; }
</style>
</head>

<body>

<div class="topbar">VA Classroom Dashboard</div>

<div class="container">

<div class="sidebar">
    <h3>Trainer View</h3>

    <button onclick="switchTrainer('Au')">Au</button>
    <button onclick="switchTrainer('Chanie')">Chanie</button>
    <button onclick="switchTrainer('Leo')">Leo</button>

    <hr>

    <div id="occupancy">0/10 seats</div>

    <h4>Search VA</h4>
    <input type="text" id="searchBox" onkeydown="handleSearchKey(event)">
</div>

<div class="main">

<div class="card">
    <h3>Assign VA</h3>

    <input id="vaName" placeholder="VA Name">
    <input id="agency" placeholder="Agency">

    <select id="trainerSelect">
        <option value="">Select Trainer</option>
        <option>Au</option>
        <option>Chanie</option>
        <option>Leo</option>
    </select>

    <button onclick="assignVA()">Assign VA</button>
</div>

<div class="card">
    <h3 id="classTitle"></h3>
    <div class="grid" id="seatGrid"></div>
</div>

</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <input id="modalInput" class="hidden">

        <div class="modal-actions">
            <button id="modalCancel">Cancel</button>
            <button id="modalOk">OK</button>
        </div>
    </div>
</div>

<!-- ACTION -->
<div id="actionOverlay" class="modal-overlay hidden">
    <div class="action-box">
        <div id="actionTitle"></div>

        <button class="secondary" onclick="editVA()">Edit VA</button>
        <button class="secondary" onclick="moveVA()">Move VA</button>
        <button class="danger" onclick="deleteVA()">Delete VA</button>
        <button class="closeBtn" onclick="closeAction()">Close</button>
    </div>
</div>

<script>

/* your JS stays EXACTLY the same */

</script>

</body>
</html>
